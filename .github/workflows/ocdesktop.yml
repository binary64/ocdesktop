name: OCDesktop Build

on:
  push:
    branches: [main, feat/gateway-integration]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: OCDesktop Linux
    runs-on: ubuntu-latest

    env:
      UPLOAD_ARTIFACT: "true"
      ONLY_CACHE: "false"
      IMAGE_TAG: tdesktop:centos_env

    steps:
      - name: Clone.
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: First set up.
        run: |
          sudo apt update
          curl -sSL https://install.python-poetry.org | python3 -
          cd Telegram/build/docker/centos_env
          poetry install
          DOCKERFILE=$(DEBUG= LTO= poetry run gen_dockerfile)
          echo "$DOCKERFILE" > Dockerfile
          rm -rf __pycache__

      - name: Free up some disk space.
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be
        with:
          tool-cache: true

      - name: Set up Docker Buildx.
        uses: docker/setup-buildx-action@v4

      - name: Libraries cache.
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/.buildx-cache
          key: ${{ runner.OS }}-libs-${{ hashFiles('Telegram/build/docker/centos_env/**') }}
          restore-keys: ${{ runner.OS }}-libs-

      - name: Libraries.
        uses: docker/build-push-action@v7
        with:
          context: Telegram/build/docker/centos_env
          load: ${{ env.ONLY_CACHE == 'false' }}
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=local,src=${{ runner.temp }}/.buildx-cache
          cache-to: type=local,dest=${{ runner.temp }}/.buildx-cache-new,mode=max

      - name: Move cache.
        run: |
          rm -rf ${{ runner.temp }}/.buildx-cache
          mv ${{ runner.temp }}/.buildx-cache{-new,}

      - name: Add swap for large compilation units.
        if: env.ONLY_CACHE == 'false'
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "Swap enabled: $(swapon --show)"

      - name: OCDesktop build.
        if: env.ONLY_CACHE == 'false'
        run: |
          docker run --rm \
          --memory=7g --memory-swap=14g \
          -u $(id -u) \
          -v $PWD:/usr/src/tdesktop \
          -e CONFIG=Release \
          $IMAGE_TAG \
          /usr/src/tdesktop/Telegram/build/docker/centos_env/build.sh \
          -D CMAKE_CONFIGURATION_TYPES=Release \
          -D CMAKE_COMPILE_WARNING_AS_ERROR=OFF \
          -D TDESKTOP_API_TEST=ON \
          -D DESKTOP_APP_DISABLE_AUTOUPDATE=ON \
          -D DESKTOP_APP_DISABLE_CRASH_REPORTS=ON

      - name: Check.
        if: env.ONLY_CACHE == 'false'
        run: |
          filePath="out/Release/Telegram"
          if test -f "$filePath"; then
            echo "Build successfully done! :)"
            size=$(stat -c %s "$filePath")
            echo "File size of ${filePath}: ${size} Bytes."
          else
            echo "Build error, output file does not exist."
            exit 1
          fi

      - name: Move artifact.
        if: env.UPLOAD_ARTIFACT == 'true'
        run: |
          cd out/Release
          mkdir -p artifact
          mv Telegram artifact/OCDesktop
          if [ -f Updater ]; then mv Updater artifact/; fi
      - uses: actions/upload-artifact@v7
        if: env.UPLOAD_ARTIFACT == 'true'
        name: Upload artifact.
        with:
          name: OCDesktop-Linux
          path: out/Release/artifact/
